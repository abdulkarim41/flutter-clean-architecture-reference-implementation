name: flutter_clean_architecture_reference_implementation

workspace:
  - app/
  - core/common/
  - core/data/
  - core/domain/
  - model/apiresponse/
  - model/entity/
  - tooling/secret_env/

environment:
  sdk: ^3.10.4

dev_dependencies:
  melos: ^7.1.0

melos:
  command:
    bootstrap:
      environment:
        sdk: ^3.10.4

      dependencies:
        cupertino_icons: ^1.0.8
        http: ^1.6.0
        logger: ^2.6.1
        flutter_secure_storage: ^9.2.4
        shared_preferences: ^2.5.3
        get_it: ^8.0.3
        fluttertoast: ^8.2.12
        envied: ^1.2.0

      dev_dependencies:
        flutter_test:
          sdk: flutter
        flutter_lints: ^6.0.0
        build_runner: ^2.7.0
        melos: ^6.3.3

  scripts:
    clean_and_get:
      run: melos exec -- flutter clean && melos bootstrap
      description: Cleans and then fetches dependencies for all packages.

    generate:barrels:
      run: dart run melos_scripts/barrel_generator.dart
      description: Update all package barrel files

    update_overrides:
      run: melos exec -- dart run $(pwd)/scripts/pubspec_overrides.dart && melos bootstrap

    env_secret_generate:
      run: melos exec --scope secret_env -- dart run build_runner build

    build_runner: |
      melos exec -c 1 --scope="domain" --scope="apiresponse" --scope="entity" -- \
        flutter pub run build_runner build --delete-conflicting-outputs

